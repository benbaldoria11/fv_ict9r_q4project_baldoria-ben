<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">

    <style>
  body{
    background-color:#615e5c;
    background-size: cover;
    background-repeat: no-repeat;
    font-family: Electrolize;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box{
    background: #1f2933;
    color: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
  }

  h1{
    color: #ffc107;
    margin-bottom: 15px;
    text-align:center;
  }

  label{
    margin-top: 15px;
    font-size: 14px;
  }

  input{
    border-radius: 15px;
  }
  
  .btn{
    margin-top: 20px;
    background: #ffc107;
    border-radius: 6px;
  }

  div{
    margin-top: 10px;
  }
  input{
    margin-top: 10px;
  }
    </style>
</head>
<body>

<div class="box">
  <form>
  <h1>Login</h1>

<label for="name">Username</label>
<input type="text" id="name" class="form-control" placeholder="Input User Here...">

<label for="word">Password</label>
<input type="password" id="word" class="form-control" placeholder="Input Password Here...">

<div>
    <input type="checkbox" id="check" onclick="rememberMe()"> Stay logged in
    <p id="glasses"></p>
</div>

<p id="display"></p>

<button type="button" id="loginBTN" class="btn" onclick="loginHere()">Login</button>
<input type="reset" id="cancelBTN" class="btn" value="Cancel">
</form>
</div>

<script>
    let attempt_counter = 0;
function loginHere(){
    let user = document.getElementById("name").value;
    let pass = document.getElementById("word").value;

    while (attempt_counter < 3) {
        if (user === "benbaldoria10" && pass === "12345678") {
            alert("Welcome " + user + "!");
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebooks.html"; //go to dashboard
            break; // stop loop
        } else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
    }

    // lock after max attempts
    if (attempt_counter >= 3) {
        alert("Access Denied; you have reached three attempts.");
        document.getElementById("loginBTN").disabled = true; // disable button
    }
}

function rememberMe(){
    let box = document.getElementById("check").checked; 

    switch(box) {
        case true:
            document.getElementById("glasses").innerHTML="Your credentials will be saved";
        break;
        default:
            document.getElementById("glasses").innerHTML="";
 }
}
</script>
</body>
</html>
